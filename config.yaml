# Ollama Configuration
ollama:
  model: "llama3.2"  # Options: llama3.2, llama2, mistral, etc.
  base_url: "http://localhost:11434"
  temperature: 0.7

# Agent Configuration
agent:
  max_iterations: 15
  verbose: true
  early_stopping_method: "generate"

# File Paths
files:
  fridge: "FRIDGE.md"
  preferences: "My-Preference.md"

